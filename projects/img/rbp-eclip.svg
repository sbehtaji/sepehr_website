<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2044;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="purpleBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a148c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6a1b9a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tealBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00695c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mlBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b71c1c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4fc3f7"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#66bb6a"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ce93d8"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffca28"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#4fc3f7" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#90caf9" letter-spacing="1">RBP BINDING PREDICTION · eCLIP + RIBO-SEQ + ML</text>
  <line x1="60" y1="44" x2="740" y2="44" stroke="#1565c0" stroke-width="1" opacity="0.6"/>

  <!-- ===== PIPELINE ROW 1: DATA SOURCES ===== -->
  <text x="400" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#546e7a" letter-spacing="2">INPUT DATA</text>

  <!-- eCLIP block -->
  <rect x="30" y="78" width="210" height="130" rx="8" fill="#0d1f3a" stroke="#1565c0" stroke-width="1.5"/>
  <text x="135" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4fc3f7">eCLIP-seq</text>
  <text x="135" y="111" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#78909c">enhanced CLIP + sequencing</text>
  <!-- UV crosslink icon -->
  <circle cx="75" cy="148" r="26" fill="#0d2a4a" stroke="#ffca28" stroke-width="1.5"/>
  <text x="75" y="144" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#ffca28">UV</text>
  <text x="75" y="156" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#ffe082">crosslink</text>
  <!-- IP icon -->
  <rect x="110" y="130" width="42" height="36" rx="4" fill="#1a3a60" stroke="#4fc3f7" stroke-width="1"/>
  <text x="131" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#90caf9">Immuno-</text>
  <text x="131" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#90caf9">precip.</text>
  <!-- Seq icon -->
  <rect x="162" y="130" width="60" height="36" rx="4" fill="#0d3a2a" stroke="#66bb6a" stroke-width="1"/>
  <text x="192" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#a5d6a7">Next-Gen</text>
  <text x="192" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#a5d6a7">Sequencing</text>
  <!-- ENCODE label -->
  <text x="135" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#546e7a">ENCODE RBP binding signals</text>

  <!-- Ribosome profiling block -->
  <rect x="295" y="78" width="210" height="130" rx="8" fill="#0d1f3a" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="400" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#ce93d8">Ribosome Profiling</text>
  <text x="400" y="111" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#78909c">Ribo-seq · translational dynamics</text>
  <!-- Ribosome diagram -->
  <ellipse cx="355" cy="155" rx="28" ry="16" fill="#2d1a5c" stroke="#ce93d8" stroke-width="1.5"/>
  <ellipse cx="355" cy="148" rx="20" ry="10" fill="#1e1040" stroke="#ce93d8" stroke-width="1"/>
  <text x="355" y="153" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#e1bee7">60S</text>
  <text x="355" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#e1bee7">40S</text>
  <!-- mRNA line through ribosome -->
  <line x1="310" y1="162" x2="395" y2="162" stroke="#ffca28" stroke-width="2.5" stroke-linecap="round"/>
  <text x="400" y="166" text-anchor="start" font-family="system-ui,sans-serif" font-size="8" fill="#ffe082">mRNA</text>
  <!-- Ribosome footprint -->
  <rect x="390" y="130" width="98" height="52" rx="4" fill="#1a0d30" stroke="#9c27b0" stroke-width="1"/>
  <text x="439" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#ce93d8">Footprint reads</text>
  <!-- mini bar chart -->
  <rect x="400" y="162" width="6" height="12" fill="#9c27b0" opacity="0.8"/>
  <rect x="410" y="157" width="6" height="17" fill="#9c27b0" opacity="0.8"/>
  <rect x="420" y="153" width="6" height="21" fill="#7b1fa2"/>
  <rect x="430" y="159" width="6" height="15" fill="#9c27b0" opacity="0.8"/>
  <rect x="440" y="155" width="6" height="19" fill="#7b1fa2"/>
  <rect x="450" y="161" width="6" height="13" fill="#9c27b0" opacity="0.8"/>
  <rect x="460" y="158" width="6" height="16" fill="#9c27b0" opacity="0.8"/>
  <text x="440" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#546e7a">Translation efficiency signals</text>

  <!-- Treatment response block -->
  <rect x="560" y="78" width="210" height="130" rx="8" fill="#0d1f3a" stroke="#00695c" stroke-width="1.5"/>
  <text x="665" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#80cbc4">Treatment Data</text>
  <text x="665" y="111" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#78909c">drug-induced translational changes</text>
  <!-- dose-response curve -->
  <g transform="translate(580,120)">
    <line x1="0" y1="60" x2="170" y2="60" stroke="#37474f" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="60" stroke="#37474f" stroke-width="1"/>
    <path d="M5,58 Q30,55 50,40 Q80,15 120,8 Q145,5 165,4" fill="none" stroke="#80cbc4" stroke-width="2" filter="url(#glow2)"/>
    <text x="85" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#546e7a">Drug concentration</text>
    <text x="-10" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#546e7a" transform="rotate(-90,-10,30)">TE</text>
  </g>

  <!-- ===== PIPELINE ROW 2: FEATURE ENGINEERING ===== -->
  <rect x="30" y="240" width="740" height="70" rx="8" fill="#071422" stroke="#1565c0" stroke-width="1" opacity="0.9"/>
  <text x="55" y="262" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4fc3f7">FEATURE ENGINEERING</text>

  <!-- Feature pills -->
  <rect x="50" y="272" width="90" height="24" rx="4" fill="#1565c0" stroke="#4fc3f7" stroke-width="0.8"/>
  <text x="95" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e3f2fd">eCLIP binding peaks</text>

  <rect x="150" y="272" width="85" height="24" rx="4" fill="#1565c0" stroke="#4fc3f7" stroke-width="0.8"/>
  <text x="192" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e3f2fd">Ribo-seq TE scores</text>

  <rect x="245" y="272" width="95" height="24" rx="4" fill="#1565c0" stroke="#4fc3f7" stroke-width="0.8"/>
  <text x="292" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e3f2fd">RBP motif features</text>

  <rect x="350" y="272" width="80" height="24" rx="4" fill="#1565c0" stroke="#4fc3f7" stroke-width="0.8"/>
  <text x="390" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e3f2fd">Codon usage</text>

  <rect x="440" y="272" width="90" height="24" rx="4" fill="#1565c0" stroke="#4fc3f7" stroke-width="0.8"/>
  <text x="485" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e3f2fd">mRNA structure</text>

  <rect x="540" y="272" width="95" height="24" rx="4" fill="#1565c0" stroke="#4fc3f7" stroke-width="0.8"/>
  <text x="587" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e3f2fd">Sequence context</text>

  <rect x="645" y="272" width="110" height="24" rx="4" fill="#1565c0" stroke="#4fc3f7" stroke-width="0.8"/>
  <text x="700" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e3f2fd">Treatment response Δ</text>

  <!-- Arrows row 1 → row 2 -->
  <line x1="135" y1="208" x2="260" y2="240" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,2"/>
  <line x1="400" y1="208" x2="400" y2="240" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,2"/>
  <line x1="665" y1="208" x2="555" y2="240" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,2"/>

  <!-- ===== PIPELINE ROW 3: MODELS ===== -->
  <text x="400" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#546e7a" letter-spacing="2">ML MODELS</text>

  <!-- Arrow feature eng → models -->
  <line x1="400" y1="310" x2="400" y2="350" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- XGBoost -->
  <rect x="50" y="355" width="140" height="60" rx="7" fill="#7b1f00" stroke="#ff7043" stroke-width="1.5"/>
  <text x="120" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#ffccbc">XGBoost</text>
  <text x="120" y="394" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#ff8a65">Gradient Boosted Trees</text>
  <text x="120" y="407" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#ff8a65">primary classifier</text>

  <!-- Random Forest -->
  <rect x="210" y="355" width="140" height="60" rx="7" fill="#1b4020" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="280" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#c8e6c9">Random Forest</text>
  <text x="280" y="394" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#a5d6a7">ensemble baseline</text>
  <text x="280" y="407" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#a5d6a7">feature importance</text>

  <!-- Deep / Neural -->
  <rect x="370" y="355" width="140" height="60" rx="7" fill="#1a237e" stroke="#7986cb" stroke-width="1.5"/>
  <text x="440" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#c5cae9">Neural Network</text>
  <text x="440" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#9fa8da">sequence-aware</text>
  <text x="440" y="403" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#9fa8da">binding site model</text>

  <!-- SHAP -->
  <rect x="530" y="355" width="115" height="60" rx="7" fill="#4a148c" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="587" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e1bee7">SHAP</text>
  <text x="587" y="394" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#ce93d8">feature attribution</text>
  <text x="587" y="407" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#ce93d8">interpretability</text>

  <!-- Output badge -->
  <rect x="660" y="355" width="110" height="60" rx="7" fill="#0d3a28" stroke="#26a69a" stroke-width="1.5"/>
  <text x="715" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#80cbc4">Predicted TE</text>
  <text x="715" y="389" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#4db6ac">drug-induced</text>
  <text x="715" y="401" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#4db6ac">translational Δ</text>
  <text x="715" y="413" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#546e7a">per RBP target</text>

  <!-- Arrows feature eng → each model (fan out) -->
  <line x1="200" y1="310" x2="120" y2="355" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="310" y1="310" x2="280" y2="355" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="490" y1="310" x2="587" y2="355" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="600" y1="310" x2="690" y2="355" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- ===== FOOTER ===== -->
  <text x="400" y="452" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#37474f">UV Crosslinking → Immunoprecipitation → CLIP-seq → Feature Matrix → XGBoost / RF / NN → SHAP Interpretability → Translation Efficiency Forecasting</text>

  <!-- Labels on blocks -->
  <text x="30" y="75" font-family="system-ui,sans-serif" font-size="9" fill="#4fc3f7" font-weight="700">①</text>
  <text x="295" y="75" font-family="system-ui,sans-serif" font-size="9" fill="#ce93d8" font-weight="700">②</text>
  <text x="560" y="75" font-family="system-ui,sans-serif" font-size="9" fill="#80cbc4" font-weight="700">③</text>
  <text x="30" y="238" font-family="system-ui,sans-serif" font-size="9" fill="#4fc3f7" font-weight="700">④</text>
  <text x="30" y="353" font-family="system-ui,sans-serif" font-size="9" fill="#4fc3f7" font-weight="700">⑤</text>
</svg>
