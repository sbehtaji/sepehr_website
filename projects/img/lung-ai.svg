<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <!-- Grad-CAM style heatmap gradient -->
    <radialGradient id="hm1" cx="38%" cy="62%" r="22%">
      <stop offset="0%"   stop-color="#ff1744" stop-opacity="0.82"/>
      <stop offset="40%"  stop-color="#ff6d00" stop-opacity="0.55"/>
      <stop offset="75%"  stop-color="#ffea00" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffea00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hm2" cx="60%" cy="48%" r="18%">
      <stop offset="0%"   stop-color="#ff6d00" stop-opacity="0.65"/>
      <stop offset="50%"  stop-color="#ffea00" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#ffea00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hm3" cx="52%" cy="40%" r="12%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hm4" cx="65%" cy="68%" r="14%">
      <stop offset="0%"   stop-color="#ff1744" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#ff6d00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </radialGradient>
    <!-- Feature map block gradients -->
    <linearGradient id="fm1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="fm2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="fm3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- scanline effect over xray -->
    <pattern id="scanlines" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="black" fill-opacity="0.08"/>
    </pattern>
    <clipPath id="leftPanel">
      <rect x="0" y="0" width="400" height="420"/>
    </clipPath>
    <clipPath id="rightPanel">
      <rect x="400" y="0" width="400" height="420"/>
    </clipPath>
    <!-- dark vignette for photo edges -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════════════
       BACKGROUND — pure black like a CT lightbox
  ═══════════════════════════════════════════ -->
  <rect width="800" height="420" fill="#000"/>

  <!-- ═══════════════════════════════════════════
       LEFT PANEL — original X-ray
  ═══════════════════════════════════════════ -->
  <!-- Real chest X-ray photo, cropped to left half -->
  <image href="lung-xray.png"
         x="-80" y="0" width="560" height="420"
         preserveAspectRatio="xMidYMid slice"
         clip-path="url(#leftPanel)"
         opacity="0.92"/>
  <!-- scanlines texture -->
  <rect x="0" y="0" width="400" height="420" fill="url(#scanlines)"/>
  <!-- vignette -->
  <rect x="0" y="0" width="400" height="420" fill="url(#vignette)" opacity="0.5"/>
  <!-- label -->
  <text x="12" y="22" font-family="monospace" font-size="10" fill="#78909c">INPUT · CHEST X-RAY</text>

  <!-- ═══════════════════════════════════════════
       CENTRE DIVIDER
  ═══════════════════════════════════════════ -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#263238" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════
       RIGHT PANEL — same xray + AI heatmap overlay
  ═══════════════════════════════════════════ -->
  <image href="lung-xray.png"
         x="320" y="0" width="560" height="420"
         preserveAspectRatio="xMidYMid slice"
         clip-path="url(#rightPanel)"
         opacity="0.75"/>

  <!-- Grad-CAM heatmap blobs (covers right half only) -->
  <!-- apply clip so heatmap stays in right panel -->
  <g clip-path="url(#rightPanel)">
    <rect x="400" y="0" width="400" height="420" fill="url(#hm1)" filter="url(#blur1)"/>
    <rect x="400" y="0" width="400" height="420" fill="url(#hm2)" filter="url(#blur1)"/>
    <rect x="400" y="0" width="400" height="420" fill="url(#hm3)" filter="url(#blur2)"/>
    <rect x="400" y="0" width="400" height="420" fill="url(#hm4)" filter="url(#blur2)"/>
  </g>
  <!-- scanlines -->
  <rect x="400" y="0" width="400" height="420" fill="url(#scanlines)"/>
  <!-- vignette -->
  <rect x="400" y="0" width="400" height="420" fill="url(#vignette)" opacity="0.45"/>
  <!-- label -->
  <text x="412" y="22" font-family="monospace" font-size="10" fill="#78909c">GRAD-CAM · SEVERITY LOCALISATION</text>

  <!-- ═══════════════════════════════════════════
       CNN FEATURE MAPS — bottom strip
  ═══════════════════════════════════════════ -->
  <!-- semi-transparent bar at bottom -->
  <rect x="0" y="362" width="800" height="58" fill="black" fill-opacity="0.72"/>
  <line x1="0" y1="362" x2="800" y2="362" stroke="#1a2a3a" stroke-width="1"/>

  <!-- label -->
  <text x="16" y="379" font-family="monospace" font-size="8.5" fill="#546e7a">CNN FEATURE MAPS · ResNet50 intermediate layers</text>

  <!-- Feature map thumbnails — simulated activation maps -->
  <!-- map 1 -->
  <rect x="16" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="35" cy="399" rx="14" ry="9"  fill="#1565c0" opacity="0.7" filter="url(#blur2)"/>
  <ellipse cx="52" cy="393" rx="8"  ry="6"  fill="#0d47a1" opacity="0.5"/>
  <rect x="16" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 2 -->
  <rect x="76" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="92" cy="397" rx="10" ry="12" fill="#1b5e20" opacity="0.65" filter="url(#blur2)"/>
  <ellipse cx="110" cy="392" rx="9"  ry="6"  fill="#388e3c" opacity="0.5"/>
  <rect x="76" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 3 -->
  <rect x="136" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="158" cy="400" rx="16" ry="8"  fill="#4a148c" opacity="0.7" filter="url(#blur2)"/>
  <ellipse cx="148" cy="390" rx="7"  ry="5"  fill="#7b1fa2" opacity="0.55"/>
  <rect x="136" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 4 -->
  <rect x="196" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="214" cy="396" rx="11" ry="10" fill="#bf360c" opacity="0.65" filter="url(#blur2)"/>
  <ellipse cx="232" cy="401" rx="9"  ry="6"  fill="#e64a19" opacity="0.5"/>
  <rect x="196" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 5 -->
  <rect x="256" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="275" cy="399" rx="13" ry="7"  fill="#006064" opacity="0.7" filter="url(#blur2)"/>
  <ellipse cx="290" cy="392" rx="7"  ry="8"  fill="#00838f" opacity="0.55"/>
  <rect x="256" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 6 -->
  <rect x="316" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="332" cy="398" rx="9"  ry="11" fill="#e65100" opacity="0.6" filter="url(#blur2)"/>
  <ellipse cx="350" cy="392" rx="11" ry="6"  fill="#bf360c" opacity="0.5"/>
  <rect x="316" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 7 — right side (after divider) -->
  <rect x="376" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="397" cy="397" rx="12" ry="9"  fill="#1a237e" opacity="0.7" filter="url(#blur2)"/>
  <ellipse cx="412" cy="403" rx="7"  ry="5"  fill="#283593" opacity="0.5"/>
  <rect x="376" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 8 -->
  <rect x="436" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="454" cy="400" rx="14" ry="7"  fill="#880e4f" opacity="0.7" filter="url(#blur2)"/>
  <ellipse cx="468" cy="391" rx="8"  ry="7"  fill="#ad1457" opacity="0.5"/>
  <rect x="436" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 9 -->
  <rect x="496" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="515" cy="396" rx="10" ry="11" fill="#33691e" opacity="0.65" filter="url(#blur2)"/>
  <ellipse cx="533" cy="402" rx="9"  ry="5"  fill="#558b2f" opacity="0.5"/>
  <rect x="496" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 10 -->
  <rect x="556" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="572" cy="399" rx="11" ry="8"  fill="#006064" opacity="0.6" filter="url(#blur2)"/>
  <ellipse cx="590" cy="393" rx="8"  ry="6"  fill="#00838f" opacity="0.5"/>
  <rect x="556" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 11 -->
  <rect x="616" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="635" cy="397" rx="13" ry="9"  fill="#4a148c" opacity="0.65" filter="url(#blur2)"/>
  <ellipse cx="650" cy="404" rx="7"  ry="4"  fill="#7b1fa2" opacity="0.5"/>
  <rect x="616" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- map 12 -->
  <rect x="676" y="384" width="52" height="30" rx="2" fill="#0a0a12"/>
  <ellipse cx="695" cy="399" rx="10" ry="9"  fill="#bf360c" opacity="0.7" filter="url(#blur2)"/>
  <ellipse cx="710" cy="392" rx="9"  ry="6"  fill="#e64a19" opacity="0.55"/>
  <rect x="676" y="384" width="52" height="30" rx="2" fill="none" stroke="#1e3a5a" stroke-width="0.8"/>

  <!-- ═══════════════════════════════════════════
       Minimal heatmap colour bar (right side)
  ═══════════════════════════════════════════ -->
  <defs>
    <linearGradient id="heatbar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="33%"  stop-color="#ffea00"/>
      <stop offset="66%"  stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
  </defs>
  <rect x="756" y="38" width="10" height="120" rx="2" fill="url(#heatbar)" opacity="0.85"/>
  <text x="770" y="44"  font-family="monospace" font-size="7" fill="#ef5350">HIGH</text>
  <text x="770" y="162" font-family="monospace" font-size="7" fill="#00e5ff">LOW</text>

  <!-- ═══════════════════════════════════════════
       Model label overlays
  ═══════════════════════════════════════════ -->
  <!-- bottom-right label -->
  <text x="788" y="356" text-anchor="end" font-family="monospace" font-size="8" fill="#37474f">U-Net · VGG16 · ResNet50</text>
  <text x="788" y="369" text-anchor="end" font-family="monospace" font-size="8" fill="#37474f">5-fold CV · 4-class severity</text>
</svg>
