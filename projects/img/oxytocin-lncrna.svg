<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2044;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f2840;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="geneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lncGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c62828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4fc3f7"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef5350"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4fc3f7" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#90caf9" letter-spacing="1">OXYTOCIN PATHWAY · lncRNA EXPRESSION IN BREAST CANCER</text>
  <line x1="80" y1="48" x2="720" y2="48" stroke="#1565c0" stroke-width="1" opacity="0.6"/>

  <!-- === CELL (left side) === -->
  <!-- Cell membrane -->
  <ellipse cx="155" cy="270" rx="110" ry="130" fill="url(#cellGrad)" stroke="#1565c0" stroke-width="2" opacity="0.9"/>
  <!-- Nucleus -->
  <ellipse cx="155" cy="280" rx="60" ry="68" fill="#0a1e38" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- DNA strands in nucleus -->
  <path d="M128,258 Q143,270 128,282 Q143,294 128,306" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <path d="M182,258 Q167,270 182,282 Q167,294 182,306" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <line x1="130" y1="262" x2="180" y2="262" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  <line x1="127" y1="270" x2="183" y2="270" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  <line x1="130" y1="278" x2="180" y2="278" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  <line x1="127" y1="286" x2="183" y2="286" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  <line x1="130" y1="294" x2="180" y2="294" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  <line x1="130" y1="302" x2="178" y2="302" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  <!-- Nucleus label -->
  <text x="155" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4fc3f7" opacity="0.8">NUCLEUS</text>
  <!-- Cell label -->
  <text x="155" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#90caf9" font-weight="600">Breast Epithelial Cell</text>
  <text x="155" y="176" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64b5f6" opacity="0.8">IDC Tumour vs Normal</text>
  <!-- OXTR receptor on membrane -->
  <rect x="58" y="252" width="14" height="36" rx="3" fill="#1565c0" stroke="#4fc3f7" stroke-width="1"/>
  <text x="40" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#4fc3f7">OXTR</text>
  <text x="40" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#64b5f6">receptor</text>

  <!-- === OXYTOCIN molecule (top-left) === -->
  <circle cx="42" cy="155" r="22" fill="#0d2a4a" stroke="#4fc3f7" stroke-width="1.5" filter="url(#glow)"/>
  <text x="42" y="151" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#e3f2fd">OXY-</text>
  <text x="42" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#e3f2fd">TOCIN</text>
  <!-- Arrow from OXT to receptor -->
  <path d="M55,170 Q62,210 65,252" fill="none" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>

  <!-- === SIGNALLING CASCADE (center) === -->
  <!-- Central hub label -->
  <text x="310" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#ffca28">OXYTOCIN SIGNALLING CASCADE</text>

  <!-- Ca2+ signal -->
  <circle cx="310" cy="140" r="28" fill="#0d2a4a" stroke="#ffca28" stroke-width="2" filter="url(#glow)"/>
  <text x="310" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#ffca28">Ca²⁺</text>
  <text x="310" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#ffe082">signal</text>

  <!-- Arrow from OXTR to Ca2+ -->
  <path d="M72,270 Q180,270 282,152" fill="none" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TARGET GENES (right of center) -->
  <!-- ITPR1 -->
  <rect x="370" y="100" width="72" height="28" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.2"/>
  <text x="406" y="119" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">ITPR1</text>
  <line x1="338" y1="135" x2="370" y2="118" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- CAMK2D -->
  <rect x="370" y="148" width="72" height="28" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.2"/>
  <text x="406" y="167" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">CAMK2D</text>
  <line x1="338" y1="145" x2="370" y2="160" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- RCAN1 -->
  <rect x="370" y="196" width="72" height="28" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.2"/>
  <text x="406" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">RCAN1</text>
  <line x1="338" y1="153" x2="370" y2="207" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- FOS -->
  <rect x="370" y="244" width="72" height="28" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.2"/>
  <text x="406" y="263" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">FOS</text>
  <line x1="338" y1="155" x2="370" y2="255" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- CACNA2D1 -->
  <rect x="370" y="292" width="82" height="28" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.2"/>
  <text x="411" y="311" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#e3f2fd">CACNA2D1</text>
  <line x1="338" y1="158" x2="370" y2="303" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- OXTR (gene) -->
  <rect x="370" y="340" width="72" height="28" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.2"/>
  <text x="406" y="359" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">OXTR</text>
  <line x1="338" y1="160" x2="370" y2="351" stroke="#4fc3f7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Target genes label -->
  <text x="406" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#90caf9" font-weight="600">Target Genes</text>

  <!-- === lncRNAs (far right) === -->
  <text x="620" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#ef9a9a" font-weight="600">Oxytocin-pathway lncRNAs</text>

  <!-- LincMTX2 -->
  <rect x="558" y="100" width="120" height="28" rx="5" fill="url(#lncGrad)" stroke="#ef9a9a" stroke-width="1.2"/>
  <text x="618" y="119" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fce4ec">LincMTX2 (LINC01116)</text>
  <line x1="452" y1="114" x2="558" y2="114" stroke="#ef5350" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- LincTNS1 -->
  <rect x="558" y="155" width="120" height="28" rx="5" fill="url(#lncGrad)" stroke="#ef9a9a" stroke-width="1.2"/>
  <text x="618" y="174" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fce4ec">LincTNS1 (DIRC3)</text>
  <line x1="452" y1="162" x2="558" y2="167" stroke="#ef5350" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- LincZFP161 -->
  <rect x="558" y="210" width="120" height="28" rx="5" fill="url(#lncGrad)" stroke="#ef9a9a" stroke-width="1.2"/>
  <text x="618" y="229" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fce4ec">LincZFP161 (LINC00667)</text>
  <line x1="452" y1="210" x2="558" y2="222" stroke="#ef5350" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- LincFOXF1 -->
  <rect x="558" y="265" width="120" height="28" rx="5" fill="url(#lncGrad)" stroke="#ef9a9a" stroke-width="1.2"/>
  <text x="618" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fce4ec">LincFOXF1 (FENDRR)</text>
  <line x1="452" y1="258" x2="558" y2="277" stroke="#ef5350" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- === ROC/AUC panel (bottom) === -->
  <rect x="80" y="420" width="640" height="62" rx="8" fill="#071220" stroke="#1565c0" stroke-width="1" opacity="0.9"/>

  <!-- Mini ROC curve -->
  <g transform="translate(100, 428)">
    <line x1="0" y1="44" x2="50" y2="44" stroke="#37474f" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="44" stroke="#37474f" stroke-width="1"/>
    <!-- diagonal reference -->
    <line x1="0" y1="44" x2="50" y2="0" stroke="#546e7a" stroke-width="0.8" stroke-dasharray="2,2"/>
    <!-- ROC curves -->
    <path d="M0,44 Q8,20 18,8 Q30,2 50,0" fill="none" stroke="#4fc3f7" stroke-width="2" filter="url(#glow)"/>
    <path d="M0,44 Q12,26 22,12 Q34,4 50,0" fill="none" stroke="#ef5350" stroke-width="1.5"/>
    <path d="M0,44 Q14,28 26,16 Q38,6 50,0" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="25" y="54" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#78909c">1-Specificity</text>
  </g>

  <!-- AUC metrics -->
  <text x="200" y="443" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#90caf9">ROC / AUC Analysis · 10-fold Cross-Validation</text>
  <text x="200" y="457" font-family="system-ui,sans-serif" font-size="9" fill="#4fc3f7">Bayesian GLM</text>
  <text x="200" y="470" font-family="system-ui,sans-serif" font-size="9" fill="#ef5350">GLM</text>
  <text x="200" y="483" font-family="system-ui,sans-serif" font-size="9" fill="#66bb6a">LDA</text>
  <text x="320" y="448" font-family="system-ui,sans-serif" font-size="9" fill="#78909c">log₂(transcript values) as features</text>

  <!-- AUC badge -->
  <rect x="490" y="430" width="110" height="42" rx="6" fill="#0d47a1" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="545" y="448" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#90caf9">Combined AUC</text>
  <text x="545" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#4fc3f7" filter="url(#glow)">0.75</text>

  <!-- Sensitivity/Specificity -->
  <rect x="610" y="430" width="98" height="42" rx="6" fill="#0a1e38" stroke="#1565c0" stroke-width="1"/>
  <text x="659" y="444" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#90caf9">Sensitivity 0.72</text>
  <text x="659" y="458" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#90caf9">Specificity 0.71</text>
  <text x="659" y="469" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#546e7a">n = 70 IDC patients</text>

  <!-- RT-qPCR label on cell -->
  <text x="155" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4fc3f7">RT-qPCR validation</text>
  <text x="155" y="397" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#546e7a">Tumour vs. Normal</text>
</svg>
