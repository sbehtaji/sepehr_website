<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="100%" style="stop-color:#0b1d38"/>
    </linearGradient>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#162f4e"/>
      <stop offset="100%" style="stop-color:#0e2238"/>
    </linearGradient>
    <linearGradient id="geneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="lncGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b71c1c"/>
      <stop offset="100%" style="stop-color:#8b0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4fc3f7"/>
    </marker>
    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ef5350"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#4fc3f7" stroke-width="0.5">
    <line x1="0" y1="84" x2="800" y2="84"/><line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="0" y1="252" x2="800" y2="252"/><line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="160" y1="0" x2="160" y2="420"/><line x1="320" y1="0" x2="320" y2="420"/>
    <line x1="480" y1="0" x2="480" y2="420"/><line x1="640" y1="0" x2="640" y2="420"/>
  </g>

  <!-- ── TITLE BAR ── -->
  <rect x="0" y="0" width="800" height="32" fill="#05101d"/>
  <text x="400" y="21" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#90caf9" letter-spacing="1.2">OXYTOCIN PATHWAY · lncRNA EXPRESSION IN BREAST CANCER</text>

  <!-- ── LEFT: Breast Cell ── -->
  <ellipse cx="118" cy="215" rx="95" ry="110" fill="url(#cellGrad)" stroke="#1565c0" stroke-width="1.8" opacity="0.95"/>
  <!-- nucleus -->
  <ellipse cx="118" cy="222" rx="50" ry="58" fill="#081929" stroke="#4fc3f7" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- DNA rungs -->
  <path d="M96,200 Q108,212 96,224 Q108,236 96,248" fill="none" stroke="#4fc3f7" stroke-width="1.3" opacity="0.7"/>
  <path d="M140,200 Q128,212 140,224 Q128,236 140,248" fill="none" stroke="#4fc3f7" stroke-width="1.3" opacity="0.7"/>
  <line x1="98" y1="204" x2="138" y2="204" stroke="#4fc3f7" stroke-width="0.7" opacity="0.35"/>
  <line x1="96" y1="212" x2="140" y2="212" stroke="#4fc3f7" stroke-width="0.7" opacity="0.35"/>
  <line x1="98" y1="220" x2="138" y2="220" stroke="#4fc3f7" stroke-width="0.7" opacity="0.35"/>
  <line x1="96" y1="228" x2="140" y2="228" stroke="#4fc3f7" stroke-width="0.7" opacity="0.35"/>
  <line x1="98" y1="236" x2="138" y2="236" stroke="#4fc3f7" stroke-width="0.7" opacity="0.35"/>
  <line x1="98" y1="244" x2="138" y2="244" stroke="#4fc3f7" stroke-width="0.7" opacity="0.35"/>
  <text x="118" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#4fc3f7" opacity="0.8">NUCLEUS</text>
  <!-- cell labels -->
  <text x="118" y="128" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#90caf9" font-weight="700">Breast Epithelial Cell</text>
  <text x="118" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#64b5f6">IDC Tumour vs Normal · n=70</text>
  <!-- OXTR receptor on membrane left -->
  <rect x="27" y="198" width="12" height="30" rx="3" fill="#1565c0" stroke="#4fc3f7" stroke-width="1"/>
  <text x="24" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#4fc3f7">OXTR</text>
  <!-- RT-qPCR label -->
  <text x="118" y="322" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#4fc3f7">RT-qPCR validation</text>

  <!-- OXT molecule -->
  <circle cx="34" cy="100" r="20" fill="#0b2240" stroke="#4fc3f7" stroke-width="1.4" filter="url(#glow)"/>
  <text x="34" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#e3f2fd">OXY-</text>
  <text x="34" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="#e3f2fd">TOCIN</text>
  <path d="M46,116 Q50,155 37,198" fill="none" stroke="#4fc3f7" stroke-width="1.3" marker-end="url(#arr)" stroke-dasharray="4,2"/>

  <!-- ── CENTER: Ca2+ hub ── -->
  <text x="270" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#ffca28">OXYTOCIN SIGNALLING CASCADE</text>
  <circle cx="270" cy="175" r="30" fill="#0b2240" stroke="#ffca28" stroke-width="2" filter="url(#glow)"/>
  <text x="270" y="171" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#ffca28">Ca²⁺</text>
  <text x="270" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#ffe082">signal</text>
  <!-- arrow cell → Ca2+ -->
  <path d="M213,215 Q238,195 240,178" fill="none" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── TARGET GENES ── -->
  <text x="390" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#90caf9" font-weight="600">Target Genes</text>
  <!-- ITPR1 -->
  <rect x="340" y="60" width="100" height="24" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.1"/>
  <text x="390" y="77" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">ITPR1</text>
  <line x1="295" y1="162" x2="340" y2="72" stroke="#4fc3f7" stroke-width="1.1" marker-end="url(#arr)"/>
  <!-- CAMK2D -->
  <rect x="340" y="100" width="100" height="24" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.1"/>
  <text x="390" y="117" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">CAMK2D</text>
  <line x1="295" y1="168" x2="340" y2="112" stroke="#4fc3f7" stroke-width="1.1" marker-end="url(#arr)"/>
  <!-- RCAN1 -->
  <rect x="340" y="140" width="100" height="24" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.1"/>
  <text x="390" y="157" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">RCAN1</text>
  <line x1="296" y1="175" x2="340" y2="152" stroke="#4fc3f7" stroke-width="1.1" marker-end="url(#arr)"/>
  <!-- FOS -->
  <rect x="340" y="180" width="100" height="24" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.1"/>
  <text x="390" y="197" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">FOS</text>
  <line x1="296" y1="181" x2="340" y2="191" stroke="#4fc3f7" stroke-width="1.1" marker-end="url(#arr)"/>
  <!-- CACNA2D1 -->
  <rect x="340" y="220" width="100" height="24" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.1"/>
  <text x="390" y="237" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#e3f2fd">CACNA2D1</text>
  <line x1="293" y1="188" x2="340" y2="229" stroke="#4fc3f7" stroke-width="1.1" marker-end="url(#arr)"/>
  <!-- OXTR -->
  <rect x="340" y="260" width="100" height="24" rx="5" fill="url(#geneGrad)" stroke="#64b5f6" stroke-width="1.1"/>
  <text x="390" y="277" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#e3f2fd">OXTR</text>
  <line x1="290" y1="193" x2="340" y2="269" stroke="#4fc3f7" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- ── lncRNAs ── -->
  <text x="610" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#ef9a9a" font-weight="600">Oxytocin-pathway lncRNAs</text>
  <!-- LincMTX2 -->
  <rect x="460" y="60" width="280" height="24" rx="5" fill="url(#lncGrad)" stroke="#ef9a9a" stroke-width="1.1"/>
  <text x="600" y="77" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fce4ec">LincMTX2 · LINC01116 / TALNEC2</text>
  <line x1="440" y1="72" x2="460" y2="72" stroke="#ef5350" stroke-width="1.1" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <!-- LincTNS1 -->
  <rect x="460" y="112" width="280" height="24" rx="5" fill="url(#lncGrad)" stroke="#ef9a9a" stroke-width="1.1"/>
  <text x="600" y="129" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fce4ec">LincTNS1 · DIRC3</text>
  <line x1="440" y1="124" x2="460" y2="124" stroke="#ef5350" stroke-width="1.1" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <!-- LincZFP161 -->
  <rect x="460" y="164" width="280" height="24" rx="5" fill="url(#lncGrad)" stroke="#ef9a9a" stroke-width="1.1"/>
  <text x="600" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fce4ec">LincZFP161 · LINC00667</text>
  <line x1="440" y1="176" x2="460" y2="176" stroke="#ef5350" stroke-width="1.1" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <!-- LincFOXF1 -->
  <rect x="460" y="216" width="280" height="24" rx="5" fill="url(#lncGrad)" stroke="#ef9a9a" stroke-width="1.1"/>
  <text x="600" y="233" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fce4ec">LincFOXF1 · FENDRR</text>
  <line x1="440" y1="228" x2="460" y2="228" stroke="#ef5350" stroke-width="1.1" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>

  <!-- ── BOTTOM ROC PANEL ── -->
  <rect x="0" y="340" width="800" height="80" fill="#04101c"/>
  <line x1="0" y1="340" x2="800" y2="340" stroke="#1565c0" stroke-width="1"/>

  <!-- mini ROC chart -->
  <g transform="translate(16,350)">
    <line x1="0" y1="52" x2="60" y2="52" stroke="#263238" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="52" stroke="#263238" stroke-width="1"/>
    <line x1="0" y1="52" x2="60" y2="0" stroke="#37474f" stroke-width="0.8" stroke-dasharray="2,2"/>
    <path d="M0,52 Q9,24 20,9 Q34,2 60,0" fill="none" stroke="#4fc3f7" stroke-width="2" filter="url(#glow)"/>
    <path d="M0,52 Q13,28 24,13 Q38,4 60,0" fill="none" stroke="#ef5350" stroke-width="1.5"/>
    <path d="M0,52 Q15,30 28,17 Q42,7 60,0" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
  </g>

  <!-- legend + labels -->
  <text x="90" y="362" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#90caf9">ROC / AUC Analysis · 10-fold Cross-Validation</text>
  <text x="90" y="377" font-family="system-ui,sans-serif" font-size="8.5" fill="#4fc3f7">● Bayesian GLM</text>
  <text x="170" y="377" font-family="system-ui,sans-serif" font-size="8.5" fill="#ef5350">● GLM</text>
  <text x="210" y="377" font-family="system-ui,sans-serif" font-size="8.5" fill="#66bb6a">● LDA</text>
  <text x="90" y="392" font-family="system-ui,sans-serif" font-size="8" fill="#546e7a">log₂(transcript values) · 10 genes (6 target + 4 lncRNA)</text>

  <!-- AUC badge -->
  <rect x="390" y="348" width="130" height="60" rx="7" fill="#0d47a1" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="455" y="367" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#90caf9">Combined AUC</text>
  <text x="455" y="392" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#4fc3f7" filter="url(#glow)">0.75</text>

  <!-- sensitivity/specificity -->
  <rect x="530" y="348" width="118" height="60" rx="7" fill="#081729" stroke="#1565c0" stroke-width="1"/>
  <text x="589" y="366" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#90caf9">Sensitivity 0.72</text>
  <text x="589" y="381" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#90caf9">Specificity 0.71</text>
  <text x="589" y="398" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#546e7a">n = 70 IDC patients</text>

  <!-- FOS highlight -->
  <rect x="657" y="348" width="130" height="60" rx="7" fill="#0a2218" stroke="#26a69a" stroke-width="1"/>
  <text x="722" y="364" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#80cbc4">Best single gene</text>
  <text x="722" y="379" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4fc3f7">FOS · AUC 0.78</text>
  <text x="722" y="394" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#546e7a">highest individual marker</text>
</svg>
