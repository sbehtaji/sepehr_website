<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2f59"/>
      <stop offset="100%" style="stop-color:#1a5fa8"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#1a6fd4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Connection lines -->
  <g stroke="#4a9eff" stroke-width="1.5" stroke-opacity="0.4">
    <line x1="200" y1="200" x2="400" y2="120"/>
    <line x1="200" y1="200" x2="400" y2="200"/>
    <line x1="200" y1="200" x2="400" y2="280"/>
    <line x1="400" y1="120" x2="600" y2="160"/>
    <line x1="400" y1="200" x2="600" y2="160"/>
    <line x1="400" y1="280" x2="600" y2="240"/>
    <line x1="400" y1="200" x2="600" y2="240"/>
  </g>
  <!-- Nodes -->
  <circle cx="200" cy="200" r="28" fill="url(#node)" opacity="0.9"/>
  <circle cx="400" cy="120" r="20" fill="url(#node)" opacity="0.85"/>
  <circle cx="400" cy="200" r="20" fill="url(#node)" opacity="0.85"/>
  <circle cx="400" cy="280" r="20" fill="url(#node)" opacity="0.85"/>
  <circle cx="600" cy="160" r="28" fill="url(#node)" opacity="0.9"/>
  <circle cx="600" cy="240" r="28" fill="url(#node)" opacity="0.9"/>
  <!-- Node icons / labels -->
  <text x="200" y="205" text-anchor="middle" fill="white" font-size="11" font-family="Arial" font-weight="bold">ADK</text>
  <text x="400" y="124" text-anchor="middle" fill="white" font-size="9" font-family="Arial">Gemini</text>
  <text x="400" y="204" text-anchor="middle" fill="white" font-size="9" font-family="Arial">Vertex</text>
  <text x="400" y="284" text-anchor="middle" fill="white" font-size="9" font-family="Arial">Cloud</text>
  <text x="600" y="164" text-anchor="middle" fill="white" font-size="10" font-family="Arial" font-weight="bold">Agent</text>
  <text x="600" y="244" text-anchor="middle" fill="white" font-size="10" font-family="Arial" font-weight="bold">Output</text>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" fill="#4a9eff" font-size="14" font-family="Arial" font-weight="bold" opacity="0.8">AI Agent Pipeline · Google ADK + Vertex AI</text>
</svg>
